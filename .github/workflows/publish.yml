name: Publish to GitHub Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, Linux, Build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run lint
      - run: npm run unit
        env:
          SKIP_PUBLIC_REST: '1'

  publish:
    needs: test
    runs-on: [self-hosted, Linux, Build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@cloudingenium'
      - run: npm install
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
